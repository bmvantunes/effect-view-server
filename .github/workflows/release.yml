name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: "Release action to run"
        required: true
        default: "stage"
        type: choice
        options:
          - stage

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ready:
    name: Ready
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "26"
          version: "0.2.1"
          cache: false
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Prepare Playwright apt sources
        run: bash .github/scripts/prepare-playwright-apt.sh

      - name: Install browser test dependencies
        working-directory: packages/react
        run: vp exec playwright install --with-deps chromium firefox webkit

      - name: Ready gate
        run: vp run -w ready

  stage:
    name: Stage npm package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && inputs.action == 'stage'
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "26"
          version: "0.2.1"
          cache: false
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Prepare Playwright apt sources
        run: bash .github/scripts/prepare-playwright-apt.sh

      - name: Install browser test dependencies
        working-directory: packages/react
        run: vp exec playwright install --with-deps chromium firefox webkit

      - name: Ready gate
        run: vp run -w ready

      - name: Install npm for trusted publishing
        run: npm install --global npm@11.17.0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify npm trusted publishing OIDC
        run: |
          npm --version
          node -e "if (!process.env.ACTIONS_ID_TOKEN_REQUEST_URL || !process.env.ACTIONS_ID_TOKEN_REQUEST_TOKEN) throw new Error('GitHub Actions OIDC token is unavailable. Check that the publish job has id-token: write.');"

      - name: Stage npm publish
        run: |
          vp run effect-view-server#build
          node scripts/release-publish.mjs
