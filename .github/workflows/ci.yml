name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Check, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "26"
          version: "0.2.1"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Prepare Playwright apt sources
        run: bash .github/scripts/prepare-playwright-apt.sh

      - name: Install browser test dependencies
        working-directory: packages/react
        run: vp exec playwright install --with-deps chromium firefox webkit

      - name: Ready gate
        run: vp run -w ready

  smoke-benchmarks:
    name: Smoke Benchmark Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "26"
          version: "0.2.1"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Build packages
        run: vp run -r build

      - name: Prepare Playwright apt sources
        run: bash .github/scripts/prepare-playwright-apt.sh

      - name: Install Chromium benchmark dependencies
        working-directory: packages/react
        run: vp exec playwright install --with-deps chromium

      - name: Smoke benchmark regression gate
        run: vp run -w bench:baseline:smoke

      - name: Raw read/write benchmark regression gate
        run: vp run -w bench:baseline:raw-read-write
